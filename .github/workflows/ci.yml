name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm
      - run: pnpm install
      - run: pnpm run build
