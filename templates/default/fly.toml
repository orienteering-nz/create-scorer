# fly.toml app configuration file generated for {{PROJECT_NAME}}
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = '{{PROJECT_NAME}}'
primary_region = 'syd'

[build]

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[vm]]
memory = '256mb'
cpu_kind = 'shared'
cpus = 1

[env]
AUTH_ALLOWED_ISSUERS = "https://o-zone-workflow.fly.dev,https://workflow.o-zone.nz"
